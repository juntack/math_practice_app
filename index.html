<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff7e6" />
    <title>けいさん れんしゅう</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <header>
        <p class="eyebrow">まいにち すこしずつ</p>
        <h1 id="app-title">けいさん れんしゅう</h1>
      </header>

      <div class="dashboard">
        <aside class="control-panel">
          <section class="score" aria-label="せいせき">
            <div><span>せいかい</span><strong id="correct-count">0</strong></div>
            <div><span>こたえた もんだい</span><strong id="question-count">0</strong></div>
          </section>

          <section class="settings" aria-label="しゅつだいの せってい">
            <fieldset>
              <legend>もんだいの しゅるい</legend>
              <div class="mode-options">
                <label><input type="radio" name="mode" value="addition" /> たしざん</label>
                <label><input type="radio" name="mode" value="subtraction" /> ひきざん</label>
                <label><input type="radio" name="mode" value="mixed" checked /> どちらも</label>
              </div>
            </fieldset>
            <div class="start-controls">
              <label for="question-total">もんだいすう</label>
              <input id="question-total" type="number" min="1" max="100" value="10" inputmode="numeric" />
              <span>もん</span>
              <button id="start-button" type="button">スタート</button>
            </div>
            <label class="timer-option"><input id="timer-enabled" type="checkbox" checked /> じかんを はかる</label>
            <button id="reset-button" class="reset-button" type="button">せいせきを リセット</button>
          </section>
        </aside>

        <section class="problem-card" aria-live="polite">
          <p class="instruction">こたえを いれてね</p>
          <p class="problem" id="problem" aria-label="もんだい"></p>

          <label class="answer-label" for="answer">こたえ</label>
          <input id="answer" type="text" inputmode="none" autocomplete="off" maxlength="2" readonly aria-describedby="feedback" />
          <div id="number-pad" class="number-pad" aria-label="すうじの ボタン">
            <button type="button" data-digit="1" disabled>1</button>
            <button type="button" data-digit="2" disabled>2</button>
            <button type="button" data-digit="3" disabled>3</button>
            <button type="button" data-digit="4" disabled>4</button>
            <button type="button" data-digit="5" disabled>5</button>
            <button type="button" data-digit="6" disabled>6</button>
            <button type="button" data-digit="7" disabled>7</button>
            <button type="button" data-digit="8" disabled>8</button>
            <button type="button" data-digit="9" disabled>9</button>
            <button type="button" class="delete-key" data-action="delete" disabled>けす</button>
            <button type="button" data-digit="0" disabled>0</button>
          </div>
          <button id="check-button" class="check-button" type="button" disabled>はんていする（N）</button>
          <p id="feedback" class="feedback" aria-live="assertive"></p>
          <button id="next-button" type="button" hidden>つぎの もんだい</button>
          <p id="time-result" class="time-result" aria-live="assertive"></p>
        </section>
      </div>

      <p class="hint">すうじの ボタンで こたえを いれてね。キーボードでは N キーで はんてい・つぎの もんだい</p>
    </main>
    <script src="app.js"></script>
  </body>
</html>
